<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1f2937;
    }

    .header {
      background: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .header h1 {
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: #6b7280;
    }

    .content {
      background: white;
      padding: 16px;
    }

    .status-card {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.safe {
      background: #10b981;
    }

    .status-dot.warning {
      background: #f59e0b;
    }

    .status-dot.danger {
      background: #dc2626;
    }

    .status-dot.offline {
      background: #6b7280;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .status-text {
      flex: 1;
    }

    .status-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .status-subtitle {
      font-size: 12px;
      color: #6b7280;
    }

    .url-display {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
      color: #4b5563;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: #667eea;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      background: white;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ Malicious URL Detector</h1>
    <p>Bảo vệ bạn khỏi các URL độc hại</p>
  </div>

  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>Đang tải...</div>
    </div>

    <div id="main-content" style="display: none;">
      <!-- Status Card -->
      <div class="status-card">
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <div class="status-text">
            <div class="status-title" id="status-title">Đang kiểm tra...</div>
            <div class="status-subtitle" id="status-subtitle">Vui lòng đợi</div>
          </div>
        </div>
        <div class="url-display" id="current-url">Không có URL</div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="confidence-value">0%</div>
          <div class="stat-label">Độ tin cậy</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="risk-value">N/A</div>
          <div class="stat-label">Mức độ</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="toggle-group">
          <span class="toggle-label">Bật bảo vệ</span>
          <label class="toggle">
            <input type="checkbox" id="toggle-enabled" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="toggle-group">
          <span class="toggle-label">Thông báo</span>
          <label class="toggle">
            <input type="checkbox" id="toggle-notifications" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="toggle-group">
          <span class="toggle-label">Tự động chặn</span>
          <label class="toggle">
            <input type="checkbox" id="toggle-autoblock">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <button class="btn btn-primary" id="btn-scan">
          🔍 Quét lại URL hiện tại
        </button>
      </div>
    </div>
  </div>

  <div class="footer">
    Powered by Me
  </div>

  <script src="popup.js"></script>
</body>
</html>
